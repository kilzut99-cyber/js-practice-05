<!DOCTYPE html> <!-- Тип документа HTML5 -->
<html lang="ru"> <!-- Язык страницы — русский -->
<head> <!-- Технический блок -->
    <meta charset="UTF-8"> <!-- Кодировка для кириллицы -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Адаптивность -->
    <title>JS Practice 05 - Финал</title> <!-- Заголовок -->
    <link rel="stylesheet" href="style.css"> <!-- Стили -->
</head> <!-- Конец головы -->
<body class="light-theme"> <!-- Тело со светлой темой -->
    <div class="container"> <!-- Центрирующий блок -->
        <header class="header-flex"> <!-- Шапка -->
            <h1>Практика: BOM и Таймеры</h1> <!-- Заголовок -->
            <button id="theme-toggle">Сменить тему</button> <!-- Переключатель тем -->
        </header> <!-- Конец шапки -->

        <!-- Задание 1: Секундомер -->
        <section class="card"> <!-- Карточка секундомера -->
            <h2>⏱ Секундомер</h2> <!-- Название -->
            <div id="stopwatch-display" class="display">00:00:00</div> <!-- Табло -->
            <div class="controls"> <!-- Кнопки -->
                <button id="stopwatch-start">Старт</button> <!-- Старт -->
                <button id="stopwatch-stop">Стоп</button> <!-- Стоп -->
                <button id="stopwatch-reset">Сброс</button> <!-- Сброс -->
            </div> <!-- Конец кнопок -->
        </section> <!-- Конец секции -->

        <!-- Задание 2: Обратный отсчёт -->
        <section class="card"> <!-- Карточка отсчета -->
            <h2>⏳ Обратный отсчёт</h2> <!-- Название -->
            <input type="number" id="countdown-input" placeholder="Введите секунды"> <!-- Поле ввода -->
            <div id="countdown-display" class="display">00:00</div> <!-- Табло -->
            <div class="controls"> <!-- Кнопки -->
                <button id="countdown-start">Запустить</button> <!-- Старт -->
                <button id="countdown-stop">Остановить</button> <!-- Пауза -->
                <button id="countdown-reset">Сброс</button> <!-- Сброс -->
            </div> <!-- Конец кнопок -->
        </section> <!-- Конец секции -->

        <!-- Задание 3: Уведомления -->
        <section class="card"> <!-- Карточка уведомлений -->
            <h2>🔔 Уведомления</h2> <!-- Название -->
            <button id="notification-show">Показать уведомление через 3 сек</button> <!-- Кнопка вызова -->
            <div id="notification" class="notification-toast" style="display: none;"> <!-- Блок сообщения -->
                <span>✅ Операция выполнена успешно!</span> <!-- Текст -->
                <button id="notification-close">Закрыть</button> <!-- Закрыть -->
            </div> <!-- Конец блока -->
        </section> <!-- Конец секции -->

        <!-- Задание 4: Информация о браузере (BOM) -->
        <section class="card"> <!-- Карточка данных ВОМ -->
            <h2>ℹ️ Данные браузера (BOM)</h2> <!-- Название -->
            <button id="browser-info-btn">Показать полную информацию</button> <!-- Кнопка получения -->
            <div id="browser-info" class="info-block"></div> <!-- Вывод списка -->
        </section> <!-- Конец секции -->

        <!-- Задание 5: Автосохранение (PRO) -->
        <section class="card"> <!-- Карточка автосохранения -->
            <h2>💾 Автосохранение (PRO)</h2> <!-- Название -->
            <p id="autosave-indicator">Ожидание ввода...</p> <!-- Статус -->
            <textarea id="autosave-textarea" placeholder="Ваш текст здесь..."></textarea> <!-- Увеличенное поле -->
            <div class="controls"> <!-- Кнопки -->
                <button id="autosave-toggle">Остановить автосохранение</button> <!-- Вкл/выкл -->
                <button id="autosave-clear">Очистить черновик</button> <!-- Очистка -->
            </div> <!-- Конец кнопок -->
        </section> <!-- Конец секции -->
    </div> <!-- Конец контейнера -->
    <script src="script.js"></script> <!-- Скрипты -->
</body> <!-- Конец тела -->
</html> <!-- Конец HTML -->
